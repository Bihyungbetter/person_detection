<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Patient Detector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="Camera detector">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
        <div id="guide" aria-hidden="true"></div>
      </section>
      <aside class="panel">
        <div>
          <p class="eyebrow">local vision model</p>
          <h1>Detect Me <span class="stamp">PROTOTYPE v0</span></h1>
        </div>
        <div class="status" id="status">Camera idle</div>
        <div class="score">
          <span>Match</span>
          <strong id="scoreValue">0.00</strong>
          <div class="meter"><div id="meterFill"></div></div>
        </div>
        <label class="name-field">
          <span>Patient name</span>
          <input id="patientName" type="text" placeholder="e.g. Me" maxlength="40" autocomplete="off" />
        </label>
        <div class="controls">
          <button id="startButton" type="button">Camera</button>
          <button id="auxButton" type="button" disabled data-mode="background">Background</button>
          <button id="enrollButton" type="button" disabled>Enroll</button>
          <button id="detectButton" type="button" disabled>Detect</button>
        </div>
        <ul class="patient-list" id="patientList" aria-label="Enrolled patients"></ul>
        <dl>
          <div>
            <dt>Registry</dt>
            <dd id="registryState">Checking</dd>
          </div>
          <div>
            <dt>Backend</dt>
            <dd id="backendState">Checking</dd>
          </div>
          <div>
            <dt>Threshold</dt>
            <dd id="thresholdState">--</dd>
          </div>
        </dl>
      </aside>
    </main>
    <canvas id="captureCanvas" hidden></canvas>
    <script src="/app.js"></script>
  </body>
</html>
